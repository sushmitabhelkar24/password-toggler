<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .align{
            text-align: center;
            margin-top: 30px;
            font-size: 50px;
        }
        .container{
            border: 1px solid black;
            margin:30px 450px 40px 450px;
            padding: 30px;
        }
        .logout{
            display: none;
        }
        .name-container{
            background-color: rgb(231, 223, 223);
            padding: 40px;
            margin: 20px 10px;
        }
        .sub-container{
            background-color: rgb(231, 223, 223);
            padding: 30px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin: 10px;
        }
        .password{
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid black;
            width:300px;
        }
        .password:focus{
            outline: none;
        }
        .eyeicon{
            height: 30px;
            cursor: pointer;
        }
        #btn{
            background-color: rgb(91, 91, 185);
            color: white;
            padding: 10px 20px;
            margin: 20px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 10px;
        }
         #logout{
            background-color: rgb(91, 91, 185);
            color: white;
            padding: 10px 20px;
            margin: 20px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 10px;
        }
        .name{
            width: 300px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid black;
            margin-left: 70px;
        }
        .name:focus{
            outline: none;
        }
        @media screen and (max-width : 480px){
            .align{
            margin-top: 20px;
            font-size: 30px;
        }
        .container{
            width: 100%;
            padding: 6px;
            margin: 0px;
        }
        .name-container{
            padding: 16px;
            margin: 0px;
        }
        .sub-container{
            padding: 10px;
            margin: 10px;
        }
        .password{
            margin: 10px;
            padding: 8px;
            width:100%;
        }
        .eyeicon{
            height: 20px;
        }
        #btn{
            padding: 8px 16px;
            margin: 10px;
            font-size: 10px;
        }
         #logout{
            padding: 8px 16px;
            margin: 10px;
            font-size: 10px;
        }
        .name{
            width: 100%;
            padding:6px;
            border-radius: 10px;
            margin:0px;
        }
        }
    </style>
</head>
<body>
    <h1 class="align">Password Toggler 🔑</h1>
    <div class="container">
        <h3 id="user">Hello User🙋‍♀️</h3>
        <button class="logout" id="logout" onclick="logoutUser()">Logout</button>
        <div class="name-container" id="container1">
            <input type="text" placeholder="Enter user name" id="userInput" class="name"/>
        </div>
        <div class="sub-container" id="container2">
            <img src="./images/lock.png" alt="lock" class="eyeicon"  />
            <input type="password" placeholder="Enter password"  class="password" id="input"/> 
            <img src="./images/hide.png" alt="eyeicon" class="eyeicon" id="iconeye" onclick="togglePasskey()"/>
        </div>
        <button id="btn" onclick="saveUser()">Save</button>
    </div>
    <script>
        let passwordIcon = document.getElementById("iconeye");
        let inputElement = document.getElementById("input");
        let userInput = document.getElementById("userInput");
        let saveBtn = document.getElementById("btn");
        let greetinguser = document.getElementById("user");
        let containerName = document.getElementById("container1");
        let containerPassword = document.getElementById("container2");
        let logoutBtn = document.getElementById("logout")

        let state = true;
       function togglePasskey(){
        if(state == true){
            passwordIcon.src="./images/view.png";
            inputElement.type = "text";
            state = false;
        }else{
            passwordIcon.src="./images/hide.png";
            inputElement.type = "password";
            state = true;
        }
       }
       function saveUser(){
        if(!userInput.value){
            alert("Please enter user");
            return;
        }
        if(!inputElement.value){
            alert("Please enter password");
            return;
        }
         localStorage.setItem("userName",`${userInput.value}`)
         greetinguser.innerHTML = `<h3 id="user">Hello ${userInput.value}🙋‍♀️</h3>`;
         saveBtn.style.display = "none";
         containerName.style.display = "none";
         containerPassword.style.display = "none";
         logoutBtn.style.display = "flex";
        }
        function logoutUser(){
         localStorage.clear();
         window.location.reload();
        }
    </script>
</body>
</html>
